server:
  port: 8080

spring:
  application:
    name: saas-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://saas-user-service
          predicates:
            - Path=/api/user/**
        - id: product-service
          uri: lb://saas-product-service
          predicates:
            - Path=/api/product/**
        - id: order-service
          uri: lb://saas-order-service
          predicates:
            - Path=/api/order/**
        - id: inventory-service
          uri: lb://saas-inventory-service
          predicates:
            - Path=/api/inventory/**
        - id: member-service
          uri: lb://saas-member-service
          predicates:
            - Path=/api/member/**
        - id: payment-service
          uri: lb://saas-payment-service
          predicates:
            - Path=/api/payment/**
        - id: admin-service
          uri: lb://saas-admin-service
          predicates:
            - Path=/api/admin/**
  redis:
    host: localhost
    port: 6379
    password: redis123

jwt:
  secret: saas-jwt-secret-key-2024-please-change-in-production
  ttl: 604800000

logging:
  level:
    com.saas.gateway: DEBUG
