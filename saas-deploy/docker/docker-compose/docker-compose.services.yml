version: '3.8'

services:
  # ===== 后端微服务 =====
  saas-gateway:
    build:
      context: ../../saas-backend/saas-gateway
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms256m -Xmx512m
    networks:
      - saas-net
    depends_on:
      - mysql-master
      - redis

  saas-user-service:
    build:
      context: ../../saas-backend/saas-user-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-user-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-product-service:
    build:
      context: ../../saas-backend/saas-product-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-product-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-order-service:
    build:
      context: ../../saas-backend/saas-order-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-order-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-inventory-service:
    build:
      context: ../../saas-backend/saas-inventory-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-member-service:
    build:
      context: ../../saas-backend/saas-member-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-member-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-payment-service:
    build:
      context: ../../saas-backend/saas-payment-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  saas-admin-service:
    build:
      context: ../../saas-backend/saas-admin-service
      dockerfile: ../../saas-deploy/docker/Dockerfile.java
    container_name: saas-admin-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - saas-net
    depends_on:
      - saas-gateway

  # ===== 前端 =====
  saas-frontend-admin:
    build:
      context: ../../saas-frontend-admin
      dockerfile: ../../saas-deploy/docker/Dockerfile.frontend
    container_name: saas-frontend-admin
    ports:
      - "5173:80"
    networks:
      - saas-net

  saas-frontend-mall:
    build:
      context: ../../saas-frontend-mall
      dockerfile: ../../saas-deploy/docker/Dockerfile.frontend
    container_name: saas-frontend-mall
    ports:
      - "5174:80"
    networks:
      - saas-net

networks:
  saas-net:
    external: true
